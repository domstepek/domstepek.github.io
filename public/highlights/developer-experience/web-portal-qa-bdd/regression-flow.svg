<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">web portal qa bdd regression flow</title>
  <desc id="desc">a diagram showing tagged test runs feeding browser checks and api checks, then producing reports that support repeatable release confidence.</desc>
  <style>
    .bg { fill: #fcfaf6; }
    .box { fill: #f5f2ea; stroke: #c7bfb0; stroke-width: 2; rx: 16; ry: 16; }
    .accent { fill: #e7edf6; stroke: #1f3a5f; stroke-width: 2; rx: 16; ry: 16; }
    .line { stroke: #1f3a5f; stroke-width: 3; fill: none; stroke-linecap: round; }
    .arrow { fill: #1f3a5f; }
    .label { fill: #171717; font: 600 20px Inter, Arial, sans-serif; }
    .copy { fill: #4b4b4b; font: 16px Inter, Arial, sans-serif; }
    .small { fill: #4b4b4b; font: 14px Inter, Arial, sans-serif; }
  </style>
  <rect class="bg" width="960" height="260" />

  <text class="label" x="36" y="38">web portal qa bdd: repeatable regression coverage for risky flows</text>
  <text class="small" x="36" y="62">the win was giving the team a few dependable ways to run the same checks locally, in docker, and in ci.</text>

  <rect class="box" x="36" y="102" width="188" height="110" />
  <text class="label" x="58" y="138">run target</text>
  <text class="copy" x="58" y="164">env selection</text>
  <text class="copy" x="58" y="188">smoke or tagged suites</text>

  <rect class="accent" x="292" y="102" width="230" height="110" />
  <text class="label" x="320" y="138">webdriverio +</text>
  <text class="label" x="320" y="162">cucumber</text>
  <text class="copy" x="320" y="188">behavior-focused test layer</text>

  <rect class="box" x="602" y="78" width="148" height="78" />
  <text class="label" x="632" y="114">browser</text>
  <text class="copy" x="628" y="138">portal flows</text>

  <rect class="box" x="602" y="168" width="148" height="78" />
  <text class="label" x="650" y="204">api</text>
  <text class="copy" x="626" y="228">targeted checks</text>

  <rect class="box" x="804" y="102" width="120" height="110" />
  <text class="label" x="830" y="138">report</text>
  <text class="copy" x="826" y="164">allure + ci</text>
  <text class="copy" x="816" y="188">release signal</text>

  <path class="line" d="M224 157 H292" />
  <polygon class="arrow" points="292,157 278,149 278,165" />

  <path class="line" d="M522 140 H602" />
  <polygon class="arrow" points="602,140 588,132 588,148" />

  <path class="line" d="M522 186 H602" />
  <polygon class="arrow" points="602,186 588,178 588,194" />

  <path class="line" d="M750 117 H804" />
  <polygon class="arrow" points="804,117 790,109 790,125" />

  <path class="line" d="M750 207 H804" />
  <polygon class="arrow" points="804,207 790,199 790,215" />
</svg>
