<svg xmlns="http://www.w3.org/2000/svg" width="960" height="340" viewBox="0 0 960 340" role="img" aria-labelledby="title desc">
  <title id="title">collection curator api service layout</title>
  <desc id="desc">a diagram showing a client calling an express and apollo api that coordinates auth, data stores, pub-sub, and a protected fastapi service for python endpoints.</desc>
  <style>
    .bg { fill: #fcfaf6; }
    .box { fill: #f5f2ea; stroke: #c7bfb0; stroke-width: 2; rx: 16; ry: 16; }
    .accent { fill: #e7edf6; stroke: #1f3a5f; stroke-width: 2; rx: 16; ry: 16; }
    .line { stroke: #1f3a5f; stroke-width: 3; fill: none; stroke-linecap: round; }
    .arrow { fill: #1f3a5f; }
    .label { fill: #171717; font: 600 20px Inter, Arial, sans-serif; }
    .copy { fill: #4b4b4b; font: 16px Inter, Arial, sans-serif; }
    .small { fill: #4b4b4b; font: 14px Inter, Arial, sans-serif; }
  </style>
  <rect class="bg" width="960" height="340" />

  <text class="label" x="36" y="38">collection curator api: ai exploration inside a real service boundary</text>
  <text class="small" x="36" y="62">the interesting part was not "ai" alone. it was making it live with auth, data, pub-sub, and a python side service.</text>

  <rect class="box" x="36" y="132" width="150" height="86" />
  <text class="label" x="68" y="168">client</text>
  <text class="copy" x="58" y="192">rest + graphql calls</text>

  <rect class="accent" x="250" y="100" width="258" height="150" />
  <text class="label" x="278" y="136">express + apollo</text>
  <text class="copy" x="278" y="164">rest endpoints</text>
  <text class="copy" x="278" y="188">graphql api + subscriptions</text>
  <text class="copy" x="278" y="212">zod validation + auth middleware</text>
  <text class="copy" x="278" y="236">reverse proxy to python endpoints</text>

  <rect class="box" x="250" y="274" width="258" height="40" />
  <text class="copy" x="278" y="300">cognito auth + secrets-managed service boundary</text>

  <rect class="box" x="584" y="84" width="150" height="70" />
  <text class="label" x="612" y="118">postgres</text>
  <text class="copy" x="612" y="142">prisma models</text>

  <rect class="box" x="774" y="84" width="150" height="70" />
  <text class="label" x="806" y="118">snowflake</text>
  <text class="copy" x="802" y="142">product data</text>

  <rect class="box" x="584" y="182" width="150" height="70" />
  <text class="label" x="626" y="216">redis</text>
  <text class="copy" x="610" y="240">pub-sub for subscriptions</text>

  <rect class="box" x="774" y="182" width="150" height="70" />
  <text class="label" x="810" y="216">fastapi</text>
  <text class="copy" x="796" y="240">python endpoints</text>

  <path class="line" d="M186 175 H250" />
  <polygon class="arrow" points="250,175 236,167 236,183" />

  <path class="line" d="M508 126 H584" />
  <polygon class="arrow" points="584,126 570,118 570,134" />

  <path class="line" d="M508 126 H774" />
  <polygon class="arrow" points="774,126 760,118 760,134" />

  <path class="line" d="M508 216 H584" />
  <polygon class="arrow" points="584,216 570,208 570,224" />

  <path class="line" d="M508 216 H774" />
  <polygon class="arrow" points="774,216 760,208 760,224" />

  <text class="small" x="584" y="292">one place to test where retrieval, subscriptions, and mixed-language services helped and where they added drag</text>
</svg>
